<div
  class="layout-wrapper"
  [ngClass]="{'layout-mobile-active': staticMenuMobileActive}">

  <div class="layout-data">
    <!-- Match DVLS: keep the sidebar in the fixed dark theme scope even when the main workspace theme changes. -->
    <div class="layout-menu-container" data-theme="dark">
      <app-menu></app-menu>
    </div>

    <div class="layout-main visible-layout">
      <div class="layout-main-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>

</div>
