[package]
name = "process-exec"
version = "0.0.0"
edition = "2024"
license = "MIT/Apache-2.0"
authors = ["Devolutions Inc. <infos@devolutions.net>"]
description = "Protocol-neutral Windows process execution engine with IO redirection and codepage transcoding"
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tempfile = "3"
tokio = { version = "1", features = ["sync"] }
win-api-wrappers = { path = "../win-api-wrappers" }

[target.'cfg(windows)'.dependencies.windows]
version = "0.61"
features = [
    "Win32_Foundation",
    "Win32_Globalization",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
]
