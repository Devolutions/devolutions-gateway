[package]
name = "network-scanner"
version = "0.0.0"
authors = ["Devolutions Inc. <infos@devolutions.net>"]
edition = "2024"
publish = false

[features]
# Exposes a handful of internal helpers (e.g. `task_utils::ContextConfig`,
# `task_utils::TaskExecutionContext`) so out-of-crate integration tests under
# `testsuite/` can construct them directly. Never enable in production builds.
test-utils = []

[lints]
workspace = true

[dependencies]
anyhow = "1"
crossbeam = { version = "0.8", features = ["crossbeam-channel"] }
dns-lookup = "2.0"
mdns-sd = "0.11"
network-interface = "2.0"
network-scanner-net = { path = "../network-scanner-net" }
network-scanner-proto = { path = "../network-scanner-proto" }
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
socket2 = "0.5"
thiserror = "2"
tokio = { version = "1.52", features = ["rt", "sync", "time", "fs"] }
tracing = "0.1"
typed-builder = "0.21"

[target.'cfg(target_os = "windows")'.dependencies]
ipconfig = "0.3"
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_IpHelper",
    "Win32_NetworkManagement_Ndis",
    "Win32_Networking_WinSock",
] }

[target.'cfg(target_os = "linux")'.dependencies]
futures-util = "0.3"
netlink-packet-route = "0.26"
rtnetlink = "0.19"

[dev-dependencies]
tokio = { version = "1.52", features = ["rt", "macros", "rt-multi-thread", "tracing", "signal"] }
tracing-subscriber = "0.3"
