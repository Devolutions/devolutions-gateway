"$schema": https://aka.ms/unigetui/package-policy.schema.1.0.json
PolicyVersion: 1.0.0
PolicyType: PackageBrokerPolicy
Metadata:
  id: contoso.desktop.standard-allowlist-yaml
  Publisher: Contoso IT
  Revision: 1
  PublishedAt: "2026-05-05T00:00:00Z"
  Description: Fail-closed YAML policy for standard workstation package installs.
Enforcement:
  DefaultDecision: Deny
  RulePrecedence: PriorityThenDeny
Rules:
  - id: Deny.integrity-bypass
    enabled: true
    priority: 10
    decision: Deny
    reason: Integrity and publisher checks cannot be bypassed by brokered requests.
    match:
      operations:
        - install
        - update
      skipHashCheck:
        - true
  - id: Allow.winget.vscode
    enabled: true
    priority: 100
    decision: Allow
    reason: Visual Studio Code is approved for managed workstations.
    match:
      operations:
        - install
        - update
      managers:
        - Winget
      sources:
        - winget
      packageIdentifiers:
        - Microsoft.VisualStudioCode
      scopes:
        - user
        - machine
      architectures:
        - x64
        - arm64
    constraints:
      allowInteractive: false
      allowSkipHashCheck: false
      allowPreRelease: false
      allowCustomParameters: false
      allowPrePostCommands: false
      allowKillBeforeOperation: false